<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome | jacksontao.github.io</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
            overflow: hidden;
        }
        .bg-decoration {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
        }
        .bg-decoration::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(233, 69, 96, 0.1) 0%, transparent 50%);
            animation: rotate 20s linear infinite;
        }
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 3rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: linear-gradient(135deg, #e94560, #0f3460);
            margin: 0 auto 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            font-weight: bold;
            box-shadow: 0 10px 30px rgba(233, 69, 96, 0.4);
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #fff, #e94560);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .domain {
            color: #8892b0;
            font-size: 1.1rem;
            margin-bottom: 2rem;
            font-family: 'Courier New', monospace;
        }
        .description {
            color: #ccd6f6;
            font-size: 1.1rem;
            line-height: 1.8;
            max-width: 500px;
            margin: 0 auto 2rem;
        }
        .links {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }
        .link {
            display: inline-block;
            padding: 0.8rem 2rem;
            background: transparent;
            border: 1px solid #e94560;
            color: #e94560;
            text-decoration: none;
            border-radius: 30px;
            transition: all 0.3s ease;
            font-weight: 500;
        }
        .link:hover {
            background: #e94560;
            color: #fff;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(233, 69, 96, 0.3);
        }
        .stats {
            margin-top: 2rem;
            padding-top: 2rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: center;
            gap: 3rem;
        }
        .stat {
            text-align: center;
        }
        .stat-number {
            font-size: 2rem;
            font-weight: bold;
            color: #e94560;
        }
        .stat-label {
            color: #8892b0;
            font-size: 0.9rem;
            margin-top: 0.3rem;
        }
        footer {
            position: absolute;
            bottom: 2rem;
            color: #8892b0;
            font-size: 0.9rem;
        }
        footer a {
            color: #e94560;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="bg-decoration"></div>
    <div class="container">
        <div class="avatar">J</div>
        <h1>Jackson Tao</h1>
        <p class="domain">jacksontao.github.io</p>
        <p class="description">
            Welcome to my personal website.<br>
            Exploring the world of technology and innovation.
        </p>
        <div class="links">
            <a href="#" class="link">About</a>
            <a href="#" class="link">Projects</a>
            <a href="#" class="link">Contact</a>
        </div>
        <div class="stats">
            <div class="stat">
                <div class="stat-number">0</div>
                <div class="stat-label">Projects</div>
            </div>
            <div class="stat">
                <div class="stat-number">0</div>
                <div class="stat-label">Stars</div>
            </div>
            <div class="stat">
                <div class="stat-number">0</div>
                <div class="stat-label">Followers</div>
            </div>
        </div>
    </div>
    <footer>
        &copy; 2026 <a href="#">Jackson Tao</a>. All rights reserved.
    </footer>
</body>
</html>
